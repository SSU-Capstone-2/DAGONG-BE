<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>카카오 로그인 성공</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 1.5;
        }
        textarea {
            width: 100%;
            height: 100px;
            font-size: 14px;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            margin-top: 10px;
            padding: 6px 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<h2>카카오 로그인 성공!</h2>
<p>아래에 표시된 JWT를 복사해서 Swagger “Authorize” 창에 붙여넣으세요.</p>
<textarea id="jwtArea" readonly></textarea>
<br />
<button onclick="copyToken()">토큰 복사하기</button>

<script>
    (function() {
        // URL에서 token 파라미터를 가져와서 textarea에 세팅
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const area = document.getElementById('jwtArea');
        if (token) {
            area.value = token;
        } else {
            area.value = '토큰이 없습니다. /auth/login/kakao-test?code=… 로 다시 시도하세요.';
        }
    })();

    // ★ 최신 Clipboard API를 사용해서 복사
    function copyToken() {
        const area = document.getElementById('jwtArea');
        const tokenText = area.value;
        if (!tokenText) {
            alert('복사할 토큰이 없습니다.');
            return;
        }

        // navigator.clipboard.writeText을 사용
        navigator.clipboard.writeText(tokenText)
            .then(() => {
                alert('JWT가 클립보드에 복사되었습니다.');
            })
            .catch(err => {
                console.error('클립보드 복사에 실패했습니다:', err);
                alert('복사에 실패했습니다. 브라우저 권한을 확인하세요.');
            });
    }
</script>
</body>
</html>
